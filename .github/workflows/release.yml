name: Release

# When a version bump lands on main, tag it (vX.Y.Z) and cut a GitHub Release
# with auto-generated notes. Skips if the tag already exists (manifest changed
# for some other reason). Tag/release creation works with GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - extension/manifest.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag and release if the version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version extension/manifest.json)
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists — nothing to release."
            exit 0
          fi
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
