<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TCGplayer Price Watch — Settings</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
      max-width: 760px; margin: 0 auto; padding: 24px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    h1 .version { font-size: 12px; font-weight: 500; opacity: 0.55; vertical-align: middle; margin-left: 8px; }
    h2 { font-size: 15px; margin: 28px 0 8px; border-bottom: 1px solid #8884; padding-bottom: 4px; }
    .sub { opacity: 0.7; margin: 0 0 16px; }
    .row { display: grid; grid-template-columns: 220px 1fr; gap: 8px 12px; align-items: center; margin: 6px 0; }
    .row label { font-weight: 500; }
    .row .hint { grid-column: 2; font-size: 12px; opacity: 0.65; margin-top: -2px; }
    .group-title { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.75; margin: 20px 0 6px; }
    .group-title:first-child { margin-top: 8px; }
    input[type="text"], input[type="number"] { padding: 5px 7px; border: 1px solid #8886; border-radius: 5px; background: transparent; color: inherit; width: 100%; box-sizing: border-box; }
    input[type="checkbox"] { width: 16px; height: 16px; }
    .product { border: 1px solid #8884; border-radius: 8px; margin: 12px 0; overflow: hidden; }
    .product .fields { padding: 14px 16px; }
    .product.paused { border-color: #d9770699; }
    .product.paused .fields { opacity: 0.5; }
    .product.paused .tile-bar.top::after { content: "PAUSED"; margin-left: auto; align-self: center; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: #d97706; }
    .tile-bar { display: flex; gap: 8px; padding: 9px 14px; flex-wrap: wrap; align-items: center; }
    .tile-bar.top { border-bottom: 1px solid #8884; background: #8881; }
    .tile-bar.bottom { border-top: 1px solid #8884; justify-content: flex-end; }
    button { font: inherit; padding: 6px 14px; border-radius: 6px; border: 1px solid #8886; background: #8881; color: inherit; cursor: pointer; }
    button:hover { background: #8883; }
    button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    button.danger { color: #dc2626; }
    .bar { display: flex; gap: 10px; align-items: center; margin: 24px 0 8px; flex-wrap: wrap; }
    #pauseState { font-weight: 600; }
    #swLogs { margin-left: auto; }
    button:active { transform: translateY(1px); }
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #16a34a; color: #fff; padding: 10px 18px; border-radius: 8px;
      box-shadow: 0 6px 20px #0006; font-weight: 500; max-width: 80vw;
      opacity: 0; pointer-events: none; z-index: 1000;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.warn { background: #d97706; }
  </style>
</head>
<body>
  <h1>TCGplayer Price Watch<span class="version" id="version"></span></h1>
  <p class="sub">Settings are stored as overrides on top of the file defaults. They take effect on the next poll.</p>

  <div class="bar">
    <button id="pauseBtn" type="button"></button>
    <span id="pauseState"></span>
    <button id="swLogs" type="button" title="Opens the extension's details page — click the “service worker” link there to view the console logs.">Service worker logs ↗</button>
  </div>

  <h2>Products</h2>
  <p class="sub">Find a product's id in its TCGplayer URL: <code>/product/<b>693209</b>/…</code></p>
  <div id="products"></div>
  <button id="addProduct" type="button">+ Add product</button>

  <h2>Global settings</h2>
  <div id="config"></div>

  <div class="bar">
    <button id="save" class="primary" type="button">Save all</button>
    <button id="reset" class="danger" type="button">Reset to defaults</button>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="ui.js"></script>
</body>
</html>
